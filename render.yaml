services:
  - type: worker
    name: zero-discord-bot
    runtime: python
    buildCommand: pip install -r discord-bot/requirements.txt
    startCommand: cd discord-bot && python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      - key: GROQ_KEY
        sync: false
      - key: MONGO_URI
        sync: false
