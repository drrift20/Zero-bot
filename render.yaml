services:
  - type: web
    name: zero-discord-bot
    runtime: python
    rootDir: discord-bot
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      - key: GROQ_KEY
        sync: false
      - key: MONGO_URI
        sync: false
